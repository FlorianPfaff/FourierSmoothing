name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package with paper/test extras
        run: |
          python -m pip install -q --upgrade pip
          python -m pip install -q -e '.[paper]'

      - name: Run pytest with compact diagnostics
        run: |
          mkdir -p ci_logs
          set +e
          PYTHONPATH=src pytest -q --tb=short 2>&1 | tee ci_logs/pytest.log
          status=${PIPESTATUS[0]}
          echo "${status}" > ci_logs/pytest_exit_code.txt
          echo "--- pytest tail ---"
          tail -120 ci_logs/pytest.log
          exit "${status}"

      - name: Upload pytest diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fourier-smoothing-pytest-diagnostics
          path: ci_logs/*
          if-no-files-found: ignore

      - name: Generate smoke-test result CSVs
        run: |
          python scripts/run_identity_torus_experiment.py --output-dir ci_results --grid-sizes 9 15 --repetitions 1 --time-steps 3
          python scripts/run_truncation_negativity_diagnostic.py --output-dir ci_results --k-max-values 1 3 --sharpness-values 5 9 --evaluation-grid-size 65 --time-steps 3
          python scripts/run_particle_baseline_experiment.py --output-dir ci_results --n-particles-values 50 --n-trajectories 20 --repetitions 1 --grid-size 41 --time-steps 3

      - name: Generate smoke-test figures
        run: |
          python scripts/plot_paper_results.py --results-dir ci_results --figures-dir ci_figures --formats png

      - name: Upload generated smoke-test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fourier-smoothing-ci-artifacts
          path: |
            ci_results/*.csv
            ci_figures/*.png
          if-no-files-found: error
