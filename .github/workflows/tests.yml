name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    name: Python tests
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show runner environment
        run: |
          uname -a || true
          python --version
          which python

      - name: Install package with paper/test extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[paper]'

      - name: Run pytest
        run: |
          PYTHONPATH=src pytest -q

      - name: Generate smoke-test result CSVs
        run: |
          python scripts/run_identity_torus_experiment.py --output-dir .ci_results --grid-sizes 9 15 --repetitions 1 --time-steps 3
          python scripts/run_truncation_negativity_diagnostic.py --output-dir .ci_results --k-max-values 1 3 --sharpness-values 5 9 --evaluation-grid-size 65 --time-steps 3
          python scripts/run_particle_baseline_experiment.py --output-dir .ci_results --n-particles-values 50 --n-trajectories 20 --repetitions 1 --grid-size 41 --time-steps 3

      - name: Generate smoke-test figures
        run: |
          python scripts/plot_paper_results.py --results-dir .ci_results --figures-dir .ci_figures --formats png

      - name: Upload generated smoke-test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fourier-smoothing-ci-artifacts
          path: |
            .ci_results/*.csv
            .ci_figures/*.png
          if-no-files-found: error
