name: Pytest diagnostic

on:
  pull_request:
  workflow_dispatch:

jobs:
  pytest-diagnostic:
    name: Compact pytest diagnostic
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Run compact diagnostic
        env:
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail
          echo "Python: $(python --version)"
          git clone -q "${SERVER_URL}/${REPOSITORY}.git" repo
          cd repo
          if [ -n "${PR_NUMBER:-}" ]; then
            git fetch -q origin "pull/${PR_NUMBER}/merge"
            git checkout -q FETCH_HEAD
          fi
          python -m pip install -q --upgrade pip
          python -m pip install -q -e '.[paper]'
          set +e
          PYTHONPATH=src pytest -q --tb=short > pytest.log 2>&1
          status=$?
          echo "pytest_exit=${status}"
          echo "--- pytest.log tail ---"
          tail -120 pytest.log
          exit "${status}"
